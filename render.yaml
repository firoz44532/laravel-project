services:
  - type: web
    name: ecommerce-app
    env: php
    region: oregon
    plan: starter
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: vendor/bin/heroku-php-nginx -C nginx.conf public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - fromGroup: database

databases:
  - name: ecommerce-db
    databaseName: ecommerce
    user: ecommerce_user
